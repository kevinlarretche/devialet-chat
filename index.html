<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devialet Support</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-surface: #1a1a1a;
    --bg-elevated: #222222;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,0.08);
    --bubble-user: #1e1e1e;
    --bubble-bot: #161616;
    --success: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-mark {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .brand-sub {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    margin-top: 5px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .icon-btn:hover {
    color: var(--text-primary);
    background: var(--accent-dim);
  }

  /* ── CHAT WINDOW ── */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-elevated) transparent;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

  .message-wrapper {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease forwards;
  }
  .message-wrapper.user { align-items: flex-end; }
  .message-wrapper.bot { align-items: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bot-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bot-label::before {
    content: '';
    display: block;
    width: 14px;
    height: 1px;
    background: var(--text-muted);
  }

  .message {
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 78%;
    position: relative;
  }

  .message.user {
    background: var(--bubble-user);
    border: 1px solid var(--border);
    border-radius: 12px 12px 2px 12px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .message.bot {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .message.bot strong { font-weight: 600; color: white; }
  .message.bot em { font-style: italic; color: var(--text-secondary); }
  .message.bot ul { padding-left: 16px; margin: 8px 0; }
  .message.bot ol { padding-left: 16px; margin: 8px 0; }
  .message.bot li { margin: 4px 0; color: var(--text-secondary); }
  .message.bot a { color: white; text-decoration: underline; text-underline-offset: 3px; }
  .message.bot code { background: var(--bg-elevated); padding: 1px 6px; border-radius: 3px; font-size: 12px; font-family: monospace; color: #aaa; }
  .message.bot p { margin-bottom: 8px; }
  .message.bot p:last-child { margin-bottom: 0; }
  .message.bot h3 { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin: 10px 0 6px 0; color: white; }

  .message-time {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    margin-top: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 260px;
    transition: border-color 0.2s ease;
  }
  .product-card:hover { border-color: var(--border-hover); }

  .product-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
    filter: brightness(0.9);
  }

  .product-card-body { padding: 14px 16px 16px; }

  .product-card-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .product-card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .product-card-price {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin: 8px 0 14px;
  }

  .product-card-btn {
    display: block;
    background: white;
    color: black;
    text-align: center;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.2s ease;
  }
  .product-card-btn:hover { opacity: 0.85; }

  /* ── TYPING INDICATOR ── */
  #typing .message.bot {
    display: flex;
    gap: 5px;
    padding: 16px 18px;
    align-items: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: pulse 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── FOOTER ── */
  .footer-container {
    background: var(--bg-primary);
    border-top: 1px solid var(--border);
    padding: 16px 24px 24px;
    flex-shrink: 0;
  }

  .quick-replies {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .quick-replies::-webkit-scrollbar { display: none; }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s ease;
  }
  .qr-btn:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
    background: var(--accent-dim);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 4px 4px 18px;
    transition: border-color 0.2s ease;
  }
  .input-wrapper:focus-within {
    border-color: var(--border-hover);
  }

  .input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.01em;
    padding: 10px 0;
  }

  .input-wrapper input::placeholder {
    color: var(--text-muted);
  }

  /* ── SEND BUTTON WITH WAVE EFFECT ── */
  .send-btn-wrapper {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .send-btn {
    background: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .send-btn:hover { opacity: 0.85; }

  /* Sound wave ripples */
  .wave-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    border: 1px solid rgba(255,255,255,0);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: none;
    z-index: 1;
  }

  .send-btn-wrapper.rippling .wave-ring {
    animation: waveExpand 0.7s ease-out forwards;
  }
  .send-btn-wrapper.rippling .wave-ring:nth-child(2) {
    animation-delay: 0.1s;
  }
  .send-btn-wrapper.rippling .wave-ring:nth-child(3) {
    animation-delay: 0.2s;
  }

  @keyframes waveExpand {
    0% {
      transform: translate(-50%, -50%) scale(1);
      border-color: rgba(255,255,255,0.4);
    }
    100% {
      transform: translate(-50%, -50%) scale(2.8);
      border-color: rgba(255,255,255,0);
    }
  }

  .powered-by {
    text-align: center;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 14px;
  }

  .powered-by span { color: var(--text-secondary); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="brand-mark">
      <div class="brand-logo">
        <div style="display:flex;flex-direction:column;gap:5px">
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="14.2" viewBox="0 0 250 25.35" fill="white" aria-label="Devialet"><polygon points="228.304 0.001 228.304 4.259 236.934 4.259 236.934 22.383 241.379 22.383 241.379 4.259 250 4.259 250 0.001 228.304 0.001"></polygon><path d="M12.206,17.581H7.338V4.8h4.868c4.2,0,6.615,2.662,6.615,6.409,0,3.779-2.237,6.371-6.615,6.371M12.132,0H0V2.4H2.4V19.983H0v2.4H12.132c7.334,0,11.706-4.71,11.706-11.135C23.838,4.791,19.275,0,12.132,0"></path><polygon points="81.258 15.16 73.962 0.001 69.062 0.001 81.269 25.35 93.49 0.001 88.548 0.001 81.258 15.16"></polygon><rect x="106.892" y="0.001" width="4.448" height="22.382"></rect><path d="M133.49,12.667l3-6.09,3.051,6.09ZM138.157,0H134.82L123.877,22.383h4.862l2.7-5.512h10.136l2.785,5.512h4.861Z"></path><polygon points="165.878 0.001 161.431 0.001 161.431 22.383 179.249 22.383 179.249 18.127 165.878 18.127 165.878 0.001"></polygon><polygon points="37.644 22.383 55.646 22.383 55.646 18.128 42.088 18.128 42.088 13.322 54.248 13.322 54.248 9.068 42.088 9.068 42.088 4.259 55.163 4.259 55.163 0 37.644 0 37.644 22.383"></polygon><polygon points="194.868 22.384 212.87 22.384 212.87 18.128 199.312 18.128 199.312 13.322 211.472 13.322 211.472 9.068 199.312 9.068 199.312 4.26 212.387 4.26 212.387 0 194.868 0 194.868 22.384"></polygon></svg>
          <div class="brand-sub">
            <span class="status-dot"></span>
            Expert Assistant
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="restart-btn" title="New conversation">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-window" id="chat"></div>

<!-- FOOTER -->
<div class="footer-container">
  <div class="quick-replies" id="quick-replies"></div>
  <div class="input-wrapper">
    <input type="text" id="input" placeholder="Ask anything about your Devialet..." autocomplete="off">
    <div class="send-btn-wrapper" id="send-wrapper">
      <div class="wave-ring"></div>
      <div class="wave-ring"></div>
      <div class="wave-ring"></div>
      <button class="send-btn" id="send-btn" title="Send">
        <!-- Minimal sound wave / audio icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Center bar -->
          <rect x="11" y="4" width="2" height="16" rx="1" fill="black"/>
          <!-- Left bars -->
          <rect x="7" y="7" width="2" height="10" rx="1" fill="black"/>
          <rect x="3" y="9" width="2" height="6" rx="1" fill="black"/>
          <!-- Right bars -->
          <rect x="15" y="7" width="2" height="10" rx="1" fill="black"/>
          <rect x="19" y="9" width="2" height="6" rx="1" fill="black"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="powered-by">Powered by <span>SQU</span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('product') || 'DEV-PHANTOM';

const CONFIG = {
  bot: "Devialet",
  webhook: "https://n8n.srv1208833.hstgr.cloud/webhook/devialet-chat",
  welcome: "Welcome to Devialet Support. I'm here to help you with your Phantom, Mania, or Gemini. How can I assist you today?",
  questions: ["Setup Guide", "Connectivity", "Sound Settings", "Warranty & Repairs", "Compare Products"]
};

let chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendWrapper = document.getElementById('send-wrapper');

function triggerWave() {
  sendWrapper.classList.remove('rippling');
  void sendWrapper.offsetWidth;
  sendWrapper.classList.add('rippling');
  setTimeout(() => sendWrapper.classList.remove('rippling'), 800);
}

function parseMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  html = html.replace(/(?<!href=")(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

  const lines = html.split('\n');
  return lines.map(line => {
    const t = line.trim();
    if (!t) return '';
    if (/^<(ul|ol|li|h[1-6])/.test(t)) return t;
    return `<p>${t}</p>`;
  }).filter(Boolean).join('\n');
}

function buildProductCard(card) {
  const div = document.createElement('div');
  div.className = 'product-card';
  div.innerHTML = `
    <img src="${card.image}" alt="${card.name}" onerror="this.style.display='none'">
    <div class="product-card-body">
      <div class="product-card-label">Devialet</div>
      <div class="product-card-name">${card.name}</div>
      <div class="product-card-price">${card.price}</div>
      <a href="${card.url}" target="_blank" rel="noopener" class="product-card-btn">Discover</a>
    </div>
  `;
  return div;
}

function addMsg(text, type, card = null) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${type}`;

  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (type === 'bot') {
    const label = document.createElement('div');
    label.className = 'bot-label';
    label.textContent = 'Devialet Support';
    wrapper.appendChild(label);
  }

  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${type}`;

  if (type === 'bot') {
    msgDiv.innerHTML = parseMarkdown(text);
  } else {
    msgDiv.textContent = text;
  }

  wrapper.appendChild(msgDiv);
  if (card) wrapper.appendChild(buildProductCard(card));

  const timeDiv = document.createElement('div');
  timeDiv.className = 'message-time';
  timeDiv.textContent = time;
  wrapper.appendChild(timeDiv);

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'message-wrapper bot';

  const label = document.createElement('div');
  label.className = 'bot-label';
  label.textContent = 'Devialet Support';
  div.appendChild(label);

  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(msg);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function handleSend(textOverride) {
  const text = textOverride || input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('quick-replies').style.display = 'none';

  triggerWave();
  addMsg(text, 'user');
  showTyping();

  try {
    const res = await fetch(CONFIG.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, productId, chatId })
    });
    const data = await res.json();
    if (document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg(
      data.reply || "I'm having trouble connecting. Please try again.",
      'bot',
      data.product_card || null
    );
  } catch(e) {
    if (document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg("Connection issue. Please check your network and try again.", 'bot');
  }
}

function init() {
  chat.innerHTML = '';
  addMsg(CONFIG.welcome, 'bot');
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  qr.style.display = 'flex';
  CONFIG.questions.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = q;
    b.onclick = () => handleSend(q);
    qr.appendChild(b);
  });
}

document.getElementById('send-btn').onclick = () => handleSend();
input.onkeypress = e => { if (e.key === 'Enter') handleSend(); };
document.getElementById('restart-btn').onclick = () => {
  chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
  init();
};

init();
</script>
</body>
</html>
