<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devialet Support</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-surface: #1a1a1a;
    --bg-elevated: #222222;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,0.08);
    --bubble-user: #1e1e1e;
    --bubble-bot: #161616;
    --success: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 50;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-mark {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .brand-sub {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    margin-top: 5px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .icon-btn:hover {
    color: var(--text-primary);
    background: var(--accent-dim);
  }

  /* ── CHAT WINDOW ── */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-elevated) transparent;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

  .message-wrapper {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease forwards;
  }
  .message-wrapper.user { align-items: flex-end; }
  .message-wrapper.bot { align-items: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bot-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bot-label::before {
    content: '';
    display: block;
    width: 14px;
    height: 1px;
    background: var(--text-muted);
  }

  .message {
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 78%;
    position: relative;
  }

  .message.user {
    background: var(--bubble-user);
    border: 1px solid var(--border);
    border-radius: 12px 12px 2px 12px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .message.bot {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .message.bot strong { font-weight: 600; color: white; }
  .message.bot em { font-style: italic; color: var(--text-secondary); }
  .message.bot ul { padding-left: 16px; margin: 8px 0; }
  .message.bot ol { padding-left: 16px; margin: 8px 0; }
  .message.bot li { margin: 4px 0; color: var(--text-secondary); }
  .message.bot a { color: white; text-decoration: underline; text-underline-offset: 3px; }
  .message.bot code { background: var(--bg-elevated); padding: 1px 6px; border-radius: 3px; font-size: 12px; font-family: monospace; color: #aaa; }
  .message.bot p { margin-bottom: 8px; }
  .message.bot p:last-child { margin-bottom: 0; }
  .message.bot h3 { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin: 10px 0 6px 0; color: white; }

  .message-time {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    margin-top: 12px;
    background: #eeede8;
    border-radius: 10px;
    overflow: hidden;
    max-width: 340px;
    width: 100%;
    transition: transform 0.2s ease;
  }
  .product-card:hover { transform: translateY(-2px); }

  .product-card-img {
    width: 100%;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #eeede8;
    position: relative;
    padding: 12px 20px;
  }

  .product-card-img .new-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #111;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
  }

  .product-card-img img {
    max-width: 85%;
    max-height: 130px;
    object-fit: contain;
    display: block;
  }

  .product-card-body {
    padding: 14px 18px 16px;
    background: #eeede8;
  }

  .product-card-name {
    font-size: 15px;
    font-weight: 700;
    color: #111;
    letter-spacing: 0.01em;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .product-card-subtitle {
    font-size: 12px;
    font-weight: 400;
    color: #666;
    margin-bottom: 12px;
  }

  .product-card-colors {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .product-card-swatch {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid #ccc;
    cursor: pointer;
    transition: border-color 0.15s ease;
  }

  .product-card-swatch.active {
    border-color: #111;
  }

  .product-card-price-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .product-card-finish {
    font-size: 13px;
    font-weight: 400;
    color: #111;
  }

  .product-card-price {
    font-size: 16px;
    font-weight: 600;
    color: #111;
    letter-spacing: -0.01em;
  }

  .product-card-btn {
    display: block;
    background: #111;
    color: #fff;
    text-align: center;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.2s ease;
    font-family: 'Inter', sans-serif;
  }
  .product-card-btn:hover { background: #333; }

  /* ── TYPING INDICATOR ── */
  #typing .message.bot {
    display: flex;
    gap: 5px;
    padding: 16px 18px;
    align-items: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: pulse 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── FOOTER ── */
  .footer-container {
    background: var(--bg-primary);
    border-top: 1px solid var(--border);
    padding: 16px 24px 24px;
    flex-shrink: 0;
  }

  .quick-replies {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .quick-replies::-webkit-scrollbar { display: none; }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s ease;
  }
  .qr-btn:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
    background: var(--accent-dim);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 4px 4px 18px;
    transition: border-color 0.2s ease;
  }
  .input-wrapper:focus-within {
    border-color: var(--border-hover);
  }

  .input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.01em;
    padding: 10px 0;
  }

  .input-wrapper input::placeholder {
    color: var(--text-muted);
  }

  /* ── SEND BUTTON WITH WAVE EFFECT ── */
  .send-btn-wrapper {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .send-btn {
    background: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .send-btn:hover { opacity: 0.85; }

  /* Sound wave ripples */
  .wave-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    border: 1px solid rgba(255,255,255,0);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(1);
    pointer-events: none;
    z-index: 1;
  }

  .send-btn-wrapper.rippling .wave-ring {
    animation: waveExpand 0.7s ease-out forwards;
  }
  .send-btn-wrapper.rippling .wave-ring:nth-child(2) {
    animation-delay: 0.1s;
  }
  .send-btn-wrapper.rippling .wave-ring:nth-child(3) {
    animation-delay: 0.2s;
  }

  @keyframes waveExpand {
    0% {
      transform: translate(-50%, -50%) scale(1);
      border-color: rgba(255,255,255,0.4);
    }
    100% {
      transform: translate(-50%, -50%) scale(2.8);
      border-color: rgba(255,255,255,0);
    }
  }

  .powered-by {
    text-align: center;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 14px;
  }

  .powered-by a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.25s ease;
    position: relative;
  }

  .powered-by a::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 1px;
    background: var(--text-secondary);
    transition: width 0.3s ease;
  }

  .powered-by a:hover {
    color: var(--text-primary);
  }

  .powered-by a:hover::after {
    width: 100%;
    background: var(--text-primary);
  }

  /* ── LANGUAGE SELECTOR ── */
  .lang-wrapper {
    position: relative;
    z-index: 100;
  }

  .lang-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    background: var(--bg-surface);
    border: 1px solid var(--border-hover);
    border-radius: 6px;
    overflow: hidden;
    min-width: 150px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-4px);
    transition: all 0.2s ease;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .lang-dropdown.open {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .lang-option {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 10px 14px;
    background: none;
    border: none;
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: left;
  }

  .lang-option:hover {
    background: var(--accent-dim);
    color: var(--text-primary);
  }

  .lang-option.active {
    color: var(--text-primary);
  }

  .lang-option .lang-flag {
    font-size: 14px;
    line-height: 1;
  }

  .lang-option .lang-check {
    margin-left: auto;
    opacity: 0;
    font-size: 10px;
    color: var(--text-muted);
  }

  .lang-option.active .lang-check {
    opacity: 1;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="brand-mark">
      <div class="brand-logo">
        <div style="display:flex;flex-direction:column;gap:5px">
          <svg xmlns="http://www.w3.org/2000/svg" width="140" height="14.2" viewBox="0 0 250 25.35" fill="white" aria-label="Devialet"><polygon points="228.304 0.001 228.304 4.259 236.934 4.259 236.934 22.383 241.379 22.383 241.379 4.259 250 4.259 250 0.001 228.304 0.001"></polygon><path d="M12.206,17.581H7.338V4.8h4.868c4.2,0,6.615,2.662,6.615,6.409,0,3.779-2.237,6.371-6.615,6.371M12.132,0H0V2.4H2.4V19.983H0v2.4H12.132c7.334,0,11.706-4.71,11.706-11.135C23.838,4.791,19.275,0,12.132,0"></path><polygon points="81.258 15.16 73.962 0.001 69.062 0.001 81.269 25.35 93.49 0.001 88.548 0.001 81.258 15.16"></polygon><rect x="106.892" y="0.001" width="4.448" height="22.382"></rect><path d="M133.49,12.667l3-6.09,3.051,6.09ZM138.157,0H134.82L123.877,22.383h4.862l2.7-5.512h10.136l2.785,5.512h4.861Z"></path><polygon points="165.878 0.001 161.431 0.001 161.431 22.383 179.249 22.383 179.249 18.127 165.878 18.127 165.878 0.001"></polygon><polygon points="37.644 22.383 55.646 22.383 55.646 18.128 42.088 18.128 42.088 13.322 54.248 13.322 54.248 9.068 42.088 9.068 42.088 4.259 55.163 4.259 55.163 0 37.644 0 37.644 22.383"></polygon><polygon points="194.868 22.384 212.87 22.384 212.87 18.128 199.312 18.128 199.312 13.322 211.472 13.322 211.472 9.068 199.312 9.068 199.312 4.26 212.387 4.26 212.387 0 194.868 0 194.868 22.384"></polygon></svg>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('product') || 'DEV-PU108';

const CONFIG = {
  bot: "Devialet",
  webhook: "https://n8n.srv1208833.hstgr.cloud/webhook/devialet_chat",
  welcome: "Welcome to Devialet Support. I'm here to help you with your Phantom, Mania, or Gemini. How can I assist you today?",
  questions: ["Setup Guide", "Connectivity", "Sound Settings", "Warranty & Repairs", "Compare Products"]
};

let chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
let currentLang = 'en';

// Auto-detect country from browser locale/timezone
function detectCountry() {
  try {
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
    const locale = navigator.language || 'en-US';
    const regionFromLocale = locale.split('-')[1] || '';

    // Timezone → country mapping for key Devialet markets
    const tzCountry = {
      'Asia/Hong_Kong': 'HK', 'Asia/Taipei': 'TW', 'Asia/Tokyo': 'JP',
      'Asia/Seoul': 'KR', 'Asia/Singapore': 'SG', 'Asia/Shanghai': 'CN',
      'Asia/Bangkok': 'TH', 'Asia/Jakarta': 'ID',
      'Europe/Paris': 'FR', 'Europe/London': 'GB', 'Europe/Berlin': 'DE',
      'Europe/Madrid': 'ES', 'Europe/Rome': 'IT', 'Europe/Zurich': 'CH',
      'Europe/Amsterdam': 'NL', 'Europe/Brussels': 'BE',
      'America/New_York': 'US', 'America/Chicago': 'US',
      'America/Los_Angeles': 'US', 'America/Denver': 'US',
      'America/Toronto': 'CA', 'America/Vancouver': 'CA',
      'America/Mexico_City': 'MX', 'America/Sao_Paulo': 'BR',
      'Australia/Sydney': 'AU', 'Australia/Melbourne': 'AU',
      'Pacific/Auckland': 'NZ',
    };

    return tzCountry[tz] || regionFromLocale.toUpperCase() || 'US';
  } catch(e) {
    return 'US';
  }
}

// Country → currency mapping
function getCurrency(country) {
  const map = {
    'US': 'USD', 'CA': 'CAD', 'GB': 'GBP',
    'FR': 'EUR', 'DE': 'EUR', 'ES': 'EUR', 'IT': 'EUR',
    'NL': 'EUR', 'BE': 'EUR', 'CH': 'CHF',
    'HK': 'HKD', 'TW': 'TWD', 'JP': 'JPY', 'KR': 'KRW',
    'SG': 'SGD', 'CN': 'CNY', 'TH': 'THB', 'ID': 'IDR',
    'AU': 'AUD', 'NZ': 'NZD', 'MX': 'MXN', 'BR': 'BRL',
  };
  return map[country] || 'USD';
}

const userCountry = detectCountry();
const userCurrency = getCurrency(userCountry);
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendWrapper = document.getElementById('send-wrapper');

function triggerWave() {
  sendWrapper.classList.remove('rippling');
  void sendWrapper.offsetWidth;
  sendWrapper.classList.add('rippling');
  setTimeout(() => sendWrapper.classList.remove('rippling'), 800);
}

function parseMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  html = html.replace(/(?<!href=")(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

  const lines = html.split('\n');
  return lines.map(line => {
    const t = line.trim();
    if (!t) return '';
    if (/^<(ul|ol|li|h[1-6])/.test(t)) return t;
    return `<p>${t}</p>`;
  }).filter(Boolean).join('\n');
}

function buildProductCard(card) {
  const productMeta = {
    'Phantom Ultimate 108 dB': {
      subtitle: 'Full-Body Sound Technology',
      colors: [
        { hex: '#c9a96e', name: 'Gold Leaf', active: false },
        { hex: '#e8e4dc', name: 'Light Pearl', active: true },
        { hex: '#2a3a2e', name: 'Deep Forest', active: false }
      ]
    },
    'Phantom Ultimate 98 dB': {
      subtitle: 'Signature Sound, Compact Form',
      colors: [
        { hex: '#c9a96e', name: 'Gold Leaf', active: false },
        { hex: '#e8e4dc', name: 'Light Pearl', active: true },
        { hex: '#2a3a2e', name: 'Deep Forest', active: false }
      ]
    },
    'Devialet Mania': {
      subtitle: '360° Stereo Sound',
      colors: [
        { hex: '#1a1a1a', name: 'Deep Black', active: false },
        { hex: '#c8c5be', name: 'Light Grey', active: true },
        { hex: '#d4856a', name: 'Sunset Rose', active: false }
      ]
    },
    'Devialet Gemini II': {
      subtitle: 'Adaptive Noise Cancellation',
      colors: [
        { hex: '#1a1a1a', name: 'Matte Black', active: true },
        { hex: '#e8e4dc', name: 'Iconic White', active: false }
      ]
    },
    'Devialet Dione': {
      subtitle: 'Dolby Atmos 5.1.2 Soundbar',
      colors: [
        { hex: '#2a2a2a', name: 'Matte Black', active: true }
      ]
    },
  };

  const meta = productMeta[card.name] || { subtitle: '', colors: [] };
  const activeColor = meta.colors.find(c => c.active) || meta.colors[0] || { name: '' };
  const showSwatches = meta.colors.length > 1;

  const swatchesHtml = showSwatches ? `<div class="product-card-colors">${meta.colors.map(c =>
    `<div class="product-card-swatch${c.active ? ' active' : ''}" style="background:${c.hex};" title="${c.name}"></div>`
  ).join('')}</div>` : '';

  // Change image bg in URL if it has a background param
  let imgUrl = card.image;
  if (imgUrl && imgUrl.includes('background=')) {
    imgUrl = imgUrl.replace(/background=[a-fA-F0-9]+/, 'background=eeede8');
  }

  const div = document.createElement('div');
  div.className = 'product-card';
  div.innerHTML = `
    <div class="product-card-img">
      <img src="${imgUrl}" alt="${card.name}" onerror="this.style.display='none';">
    </div>
    <div class="product-card-body">
      <div class="product-card-name">${card.name}</div>
      <div class="product-card-subtitle">${meta.subtitle}</div>
      ${swatchesHtml}
      <div class="product-card-price-row">
        <div class="product-card-finish">${activeColor.name}</div>
        <div class="product-card-price">${card.price}</div>
      </div>
      <a href="${card.url}" target="_blank" rel="noopener" class="product-card-btn">Buy</a>
    </div>
  `;
  return div;
}

function addMsg(text, type, card = null) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${type}`;

  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (type === 'bot') {
    const label = document.createElement('div');
    label.className = 'bot-label';
    label.textContent = 'Devialet Support';
    wrapper.appendChild(label);
  }

  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${type}`;

  if (type === 'bot') {
    msgDiv.innerHTML = parseMarkdown(text);
  } else {
    msgDiv.textContent = text;
  }

  wrapper.appendChild(msgDiv);
  if (card) wrapper.appendChild(buildProductCard(card));

  const timeDiv = document.createElement('div');
  timeDiv.className = 'message-time';
  timeDiv.textContent = time;
  wrapper.appendChild(timeDiv);

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'message-wrapper bot';

  const label = document.createElement('div');
  label.className = 'bot-label';
  label.textContent = 'Devialet Support';
  div.appendChild(label);

  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(msg);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function handleSend(textOverride) {
  const text = textOverride || input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('quick-replies').style.display = 'none';

  triggerWave();
  addMsg(text, 'user');
  showTyping();

  try {
    const res = await fetch(CONFIG.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, productId, chatId, language: currentLang, country: userCountry, currency: userCurrency })
    });
    const data = await res.json();
    if (document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg(
      data.reply || "I'm having trouble connecting. Please try again.",
      'bot',
      data.product_card || null
    );
  } catch(e) {
    if (document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg("Connection issue. Please check your network and try again.", 'bot');
  }
}

function init() {
  chat.innerHTML = '';
  addMsg(CONFIG.welcome, 'bot');
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  qr.style.display = 'flex';
  CONFIG.questions.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = q;
    b.onclick = () => handleSend(q);
    qr.appendChild(b);
  });
}

document.getElementById('send-btn').onclick = () => handleSend();
input.onkeypress = e => { if (e.key === 'Enter') handleSend(); };
document.getElementById('restart-btn').onclick = () => {
  chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
  init();
};

// ── LANGUAGE SELECTOR ──
const langBtn = document.getElementById('lang-btn');
const langDropdown = document.getElementById('lang-dropdown');

langBtn.onclick = (e) => {
  e.stopPropagation();
  langDropdown.classList.toggle('open');
};

document.addEventListener('click', () => {
  langDropdown.classList.remove('open');
});

langDropdown.addEventListener('click', (e) => {
  e.stopPropagation();
});

document.querySelectorAll('.lang-option').forEach(opt => {
  opt.onclick = () => {
    const lang = opt.dataset.lang;
    const welcome = opt.dataset.welcome;
    const placeholder = opt.dataset.placeholder;

    currentLang = lang;

    document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');

    CONFIG.welcome = welcome;
    input.placeholder = placeholder;

    langDropdown.classList.remove('open');

    chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
    init();
  };
});

init();
</script>
