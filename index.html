<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devialet Support</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-surface: #1a1a1a;
    --bg-elevated: #222222;
    --text-primary: #ffffff;
    --text-secondary: #888888;
    --text-muted: #444444;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --accent: #ffffff;
    --accent-dim: rgba(255,255,255,0.08);
    --bubble-user: #1e1e1e;
    --bubble-bot: #161616;
    --success: #2ecc71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  .header {
    background: var(--bg-primary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .brand-mark {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-logo {
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .brand-sub {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
    margin-top: 5px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--success);
    flex-shrink: 0;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .icon-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
  }
  .icon-btn:hover {
    color: var(--text-primary);
    background: var(--accent-dim);
  }

  /* ── CHAT WINDOW ── */
  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-elevated) transparent;
  }

  .chat-window::-webkit-scrollbar { width: 4px; }
  .chat-window::-webkit-scrollbar-track { background: transparent; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--bg-elevated); border-radius: 2px; }

  .message-wrapper {
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.35s ease forwards;
  }
  .message-wrapper.user { align-items: flex-end; }
  .message-wrapper.bot { align-items: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bot-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .bot-label::before {
    content: '';
    display: block;
    width: 14px;
    height: 1px;
    background: var(--text-muted);
  }

  .message {
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 78%;
    position: relative;
  }

  .message.user {
    background: var(--bubble-user);
    border: 1px solid var(--border);
    border-radius: 12px 12px 2px 12px;
    color: var(--text-primary);
    font-weight: 400;
  }

  .message.bot {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    border-radius: 2px 12px 12px 12px;
    color: var(--text-primary);
    font-weight: 400;
  }

  /* Markdown inside bot messages */
  .message.bot strong { font-weight: 600; color: white; }
  .message.bot em { font-style: italic; color: var(--text-secondary); }
  .message.bot ul { padding-left: 16px; margin: 8px 0; }
  .message.bot ol { padding-left: 16px; margin: 8px 0; }
  .message.bot li { margin: 4px 0; color: var(--text-secondary); }
  .message.bot a { color: white; text-decoration: underline; text-underline-offset: 3px; }
  .message.bot code { background: var(--bg-elevated); padding: 1px 6px; border-radius: 3px; font-size: 12px; font-family: monospace; color: #aaa; }
  .message.bot p { margin-bottom: 8px; }
  .message.bot p:last-child { margin-bottom: 0; }
  .message.bot h3 { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin: 10px 0 6px 0; color: white; }

  .message-time {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── PRODUCT CARD ── */
  .product-card {
    margin-top: 12px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    max-width: 260px;
    transition: border-color 0.2s ease;
  }
  .product-card:hover { border-color: var(--border-hover); }

  .product-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
    filter: brightness(0.9);
  }

  .product-card-body {
    padding: 14px 16px 16px;
  }

  .product-card-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .product-card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    line-height: 1.3;
    margin-bottom: 4px;
  }

  .product-card-price {
    font-size: 18px;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin: 8px 0 14px;
  }

  .product-card-btn {
    display: block;
    background: white;
    color: black;
    text-align: center;
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.2s ease;
  }
  .product-card-btn:hover { opacity: 0.85; }

  /* ── TYPING INDICATOR ── */
  #typing .message.bot {
    display: flex;
    gap: 5px;
    padding: 16px 18px;
    align-items: center;
  }

  .dot {
    width: 5px;
    height: 5px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: pulse 1.4s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── FOOTER ── */
  .footer-container {
    background: var(--bg-primary);
    border-top: 1px solid var(--border);
    padding: 16px 24px 24px;
    flex-shrink: 0;
  }

  .quick-replies {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .quick-replies::-webkit-scrollbar { display: none; }

  .qr-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s ease;
  }
  .qr-btn:hover {
    border-color: var(--border-hover);
    color: var(--text-primary);
    background: var(--accent-dim);
  }

  .input-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 4px 4px 18px;
    transition: border-color 0.2s ease;
  }
  .input-wrapper:focus-within {
    border-color: var(--border-hover);
  }

  .input-wrapper input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.01em;
    padding: 10px 0;
  }

  .input-wrapper input::placeholder {
    color: var(--text-muted);
  }

  .send-btn {
    background: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease;
    flex-shrink: 0;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn svg { fill: black; width: 16px; height: 16px; }

  .powered-by {
    text-align: center;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 14px;
  }

  .powered-by span { color: var(--text-secondary); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="brand-mark">
      <div class="brand-logo">
        <div style="display:flex;flex-direction:column;gap:4px">
          <!-- Devialet wordmark SVG — geometric sans, tight tracking -->
          <svg width="110" height="18" viewBox="0 0 110 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- D -->
            <path d="M0 1h4.5C8.6 1 11 3.8 11 9c0 5.2-2.4 8-6.5 8H0V1zm2.2 14h2.1c2.8 0 4.4-2 4.4-6s-1.6-6-4.4-6H2.2v12z" fill="white"/>
            <!-- E -->
            <path d="M14 1h8v2h-5.8v4.5H21v2h-4.8V15H22v2h-8V1z" fill="white"/>
            <!-- V -->
            <path d="M25 1h2.3l3.2 13L33.7 1H36l-4 16h-3L25 1z" fill="white"/>
            <!-- I -->
            <path d="M39 1h2.2v16H39V1z" fill="white"/>
            <!-- A -->
            <path d="M46.5 1h2.8L54 17h-2.3l-1.2-4h-5.1l-1.2 4H42L46.5 1zm2.1 3.5L46.3 11h4.4L48.6 4.5z" fill="white"/>
            <!-- L -->
            <path d="M57 1h2.2v14H64v2h-7V1z" fill="white"/>
            <!-- E -->
            <path d="M67 1h8v2h-5.8v4.5H74v2h-4.8V15H75v2h-8V1z" fill="white"/>
            <!-- T -->
            <path d="M79 1h9v2h-3.4v14h-2.2V3H79V1z" fill="white"/>
          </svg>
          <div class="brand-sub">
            <span class="status-dot"></span>
            Expert Assistant
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="restart-btn" title="New conversation">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>
</div>

<!-- CHAT -->
<div class="chat-window" id="chat"></div>

<!-- FOOTER -->
<div class="footer-container">
  <div class="quick-replies" id="quick-replies"></div>
  <div class="input-wrapper">
    <input type="text" id="input" placeholder="Ask anything about your Devialet..." autocomplete="off">
    <button class="send-btn" id="send-btn" title="Send">
      <!-- Gemini earbud icon — teardrop body + stem + ear tip -->
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Earbud body — oval teardrop -->
        <ellipse cx="10" cy="8" rx="5" ry="6" fill="black"/>
        <!-- Inner speaker grille circle -->
        <circle cx="10" cy="7.5" r="2.2" fill="#333"/>
        <circle cx="10" cy="7.5" r="1" fill="#555"/>
        <!-- Stem going down-left -->
        <path d="M7 13 Q5 15.5 4.5 17" stroke="black" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Ear tip at bottom of stem -->
        <circle cx="4.2" cy="17.2" r="1.5" fill="black"/>
      </svg>
    </button>
  </div>
  <div class="powered-by">Powered by <span>SQU</span></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('product') || 'DEV-PHANTOM';

const CONFIG = {
  bot: "Devialet",
  webhook: "https://n8n.srv1208833.hstgr.cloud/webhook/devialet-chat",
  welcome: "Welcome to Devialet Support. I'm here to help you with your Phantom, Mania, or Gemini. How can I assist you today?",
  questions: ["Setup Guide", "Connectivity", "Sound Settings", "Warranty & Repairs", "Compare Products"]
};

let chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
const chat = document.getElementById('chat');
const input = document.getElementById('input');

// ── MARKDOWN ──
function parseMarkdown(text) {
  let html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  html = html.replace(/(?<!href=")(https?:\/\/[^\s<"]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  html = html.replace(/^[\*\-] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');

  const lines = html.split('\n');
  return lines.map(line => {
    const t = line.trim();
    if (!t) return '';
    if (/^<(ul|ol|li|h[1-6])/.test(t)) return t;
    return `<p>${t}</p>`;
  }).filter(Boolean).join('\n');
}

// ── PRODUCT CARD ──
function buildProductCard(card) {
  const div = document.createElement('div');
  div.className = 'product-card';
  div.innerHTML = `
    <img src="${card.image}" alt="${card.name}" onerror="this.style.display='none'">
    <div class="product-card-body">
      <div class="product-card-label">Devialet</div>
      <div class="product-card-name">${card.name}</div>
      <div class="product-card-price">${card.price}</div>
      <a href="${card.url}" target="_blank" rel="noopener" class="product-card-btn">Discover</a>
    </div>
  `;
  return div;
}

// ── ADD MESSAGE ──
function addMsg(text, type, card = null) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${type}`;

  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (type === 'bot') {
    const label = document.createElement('div');
    label.className = 'bot-label';
    label.textContent = 'Devialet Support';
    wrapper.appendChild(label);
  }

  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${type}`;

  if (type === 'bot') {
    msgDiv.innerHTML = parseMarkdown(text);
  } else {
    msgDiv.textContent = text;
  }

  wrapper.appendChild(msgDiv);
  if (card) wrapper.appendChild(buildProductCard(card));

  const timeDiv = document.createElement('div');
  timeDiv.className = 'message-time';
  timeDiv.textContent = time;
  wrapper.appendChild(timeDiv);

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

// ── TYPING ──
function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'message-wrapper bot';

  const label = document.createElement('div');
  label.className = 'bot-label';
  label.textContent = 'Devialet Support';
  div.appendChild(label);

  const msg = document.createElement('div');
  msg.className = 'message bot';
  msg.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(msg);

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// ── SEND ──
async function handleSend(textOverride) {
  const text = textOverride || input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('quick-replies').style.display = 'none';

  addMsg(text, 'user');
  showTyping();

  try {
    const res = await fetch(CONFIG.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, productId, chatId })
    });
    const data = await res.json();
    if (document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg(
      data.reply || "I'm having trouble connecting. Please try again.",
      'bot',
      data.product_card || null
    );
  } catch(e) {
    if (document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg("Connection issue. Please check your network and try again.", 'bot');
  }
}

// ── INIT ──
function init() {
  chat.innerHTML = '';
  addMsg(CONFIG.welcome, 'bot');
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  qr.style.display = 'flex';
  CONFIG.questions.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = q;
    b.onclick = () => handleSend(q);
    qr.appendChild(b);
  });
}

document.getElementById('send-btn').onclick = () => handleSend();
input.onkeypress = e => { if (e.key === 'Enter') handleSend(); };
document.getElementById('restart-btn').onclick = () => {
  chatId = 'dev_' + Math.random().toString(36).substr(2, 9);
  init();
};

init();
</script>
</body>
</html>
